services:
  intermapper_ocr_agent:
    build: .
    container_name: intermapper_ocr_towers
    restart: unless-stopped
    ports:
      - "${APP_PORT}:${APP_PORT}"
    env_file:
      - .env
    environment:
      APP_PORT: "${APP_PORT}"
      INTERMAPPER_URL: "${INTERMAPPER_URL}"
      INTERMAPPER_USER: "${INTERMAPPER_USER}"
      INTERMAPPER_PASS: "${INTERMAPPER_PASS}"
      SCREENSHOT_DIR: "${SCREENSHOT_DIR}"
      CONCURRENT_WORKERS: "${CONCURRENT_WORKERS}"
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_USER: "${DB_USER}"
      DB_PASS: "${DB_PASS}"
      DB_NAME: "${DB_NAME}"
    volumes:
      # Persistencia de logs para monitoreo
      - ./logs:/app/logs
      # (Opcional) Persistencia de capturas si decides no borrarlas en algún momento
      - ./screenshots:/app/screenshots
    extra_hosts:
      - "host.docker.internal:host-gateway"